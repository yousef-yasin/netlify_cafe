<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>لوحة الكافتيريا</title><link rel="stylesheet" href="/static/css/bootstrap.rtl.min.css"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="/static/css/style.css"></head><body><div id="site-shell"></div><script src="/static/js/app-common.js"></script><script>
CAFE.ensureBase('لوحة الكافتيريا');
const content=document.getElementById('page-content');
content.innerHTML=`<div class="container py-3"><div class="dashboard-hero mb-4"><div><h1 class="mb-2">لوحة الكافتيريا</h1><p class="mb-0 text-white-50">عرض الطلبات، طباعة الفاتورة، أو إلغاء الطلب فقط.</p></div><div class="d-flex flex-wrap gap-2"><a href="/admin/menu/" class="btn btn-light rounded-pill px-4">إدارة المنيو</a><a href="/admin/reports/" class="btn btn-warning rounded-pill px-4">تقارير الأيام</a><button id="delete-all-btn" class="btn btn-danger rounded-pill px-4">حذف الطلبات</button><button id="logout-btn" class="btn btn-outline-light rounded-pill px-4">خروج</button></div></div><div class="row g-3 mb-4" id="stats-row"></div><div class="alert alert-warning d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4" role="alert"><div><strong>تنبيه الطلبات:</strong> اضغط الزر مرة واحدة لتفعيل الصوت وإشعارات المتصفح عند وصول طلبات جديدة.</div><button type="button" class="btn btn-outline-secondary rounded-pill px-4" id="enable-sound-btn">تفعيل الصوت والإشعارات</button></div><div class="filter-bar mb-4"><a href="#" data-status="" class="filter-pill active">الكل</a><a href="#" data-status="pending" class="filter-pill">قيد الانتظار</a><a href="#" data-status="cancelled" class="filter-pill">ملغية</a></div><div id="orders-container"></div></div>`;
const STORAGE_KEY='cafeteria_seen_order_ids'; let audioCtx=null, alertsEnabled=false, currentStatus='';
function renderStats(stats){document.getElementById('stats-row').innerHTML=`<div class="col-lg col-md-4 col-6"><div class="stat-card"><span>قيد الانتظار</span><strong>${stats.pending}</strong></div></div><div class="col-lg col-md-4 col-6"><div class="stat-card"><span>تم تأكيدها</span><strong>${stats.confirmed}</strong></div></div><div class="col-lg col-md-4 col-6"><div class="stat-card"><span>جاهزة</span><strong>${stats.ready}</strong></div></div><div class="col-lg col-md-4 col-6"><div class="stat-card"><span>ملغية</span><strong>${stats.cancelled}</strong></div></div><div class="col-lg col-md-4 col-6"><div class="stat-card"><span>إجمالي الطلبات</span><strong>${stats.total_orders}</strong></div></div><div class="col-lg col-md-4 col-6"><div class="stat-card"><span>مبيعات اليوم</span><strong>${CAFE.money(stats.sales_today)}</strong></div></div>`}
function statusLabel(s){return s==='pending'?'قيد الانتظار':s==='confirmed'?'تم التأكيد':s==='ready'?'جاهز':'ملغي'}
function renderOrders(orders){document.getElementById('orders-container').innerHTML=orders.length?`<div class="row g-4">${orders.map(order=>`<div class="col-12"><div class="order-card"><div class="d-flex justify-content-between align-items-start flex-wrap gap-3"><div><div class="small text-muted">طلب رقم #${order.id}</div><h4 class="mb-1">${order.student_name}</h4><div class="text-muted">${order.phone} • المبنى ${order.building} • ${CAFE.dt(order.created_at)}</div></div><div class="d-flex align-items-center gap-2 flex-wrap"><span class="status-pill status-${order.status}">${statusLabel(order.status)}</span><span class="price-tag">${CAFE.money(order.total)}</span></div></div><div class="items-summary mt-3">${order.items.map(item=>`<div class="summary-line"><span>${item.quantity} × ${item.item_name}</span><strong>${CAFE.money(item.unit_price*item.quantity)}</strong></div>`).join('')}</div>${order.notes?`<div class="note-box mt-3">ملاحظات: ${order.notes}</div>`:''}<div class="d-flex flex-wrap gap-2 mt-3"><a href="/receipt/?id=${order.id}" class="btn btn-dark rounded-pill px-4">طباعة الفاتورة</a>${order.status!=='cancelled'?`<button class="btn btn-outline-danger rounded-pill px-4" data-cancel="${order.id}">إلغاء الطلب</button>`:''}</div></div></div>`).join('')}</div>`:'<div class="empty-box">لا يوجد طلبات حالياً.</div>'}
function loadSeen(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){return[]} }
function saveSeen(ids){ localStorage.setItem(STORAGE_KEY, JSON.stringify(ids)); }
async function ensureAudioReady(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') await audioCtx.resume(); }
async function requestBrowserNotifications(){ if(!('Notification' in window)) return false; if(Notification.permission==='granted') return true; if(Notification.permission==='denied') return false; return (await Notification.requestPermission())==='granted'; }
function playNotificationSound(){ if(!alertsEnabled || !audioCtx || audioCtx.state!=='running') return; const oscillator=audioCtx.createOscillator(), gainNode=audioCtx.createGain(); oscillator.type='sine'; oscillator.frequency.setValueAtTime(880,audioCtx.currentTime); oscillator.frequency.setValueAtTime(660,audioCtx.currentTime+0.18); gainNode.gain.setValueAtTime(0.001,audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.2,audioCtx.currentTime+0.02); gainNode.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.45); oscillator.connect(gainNode); gainNode.connect(audioCtx.destination); oscillator.start(audioCtx.currentTime); oscillator.stop(audioCtx.currentTime+0.45); }
function showBrowserNotification(newCount){ if(!alertsEnabled||!('Notification' in window)||Notification.permission!=='granted') return; const notification=new Notification('الكافتيريا',{body:(newCount===1?'وصل طلب جديد.':`وصل ${newCount} طلبات جديدة.`)+' اضغط لفتح الصفحة.',tag:'cafeteria-new-orders',renotify:true,requireInteraction:true}); notification.onclick=()=>{window.focus(); notification.close();}; setTimeout(()=>{try{notification.close()}catch(e){}},15000); }
async function refresh(){ try{ const data=await CAFE.api(`/api/admin/dashboard${currentStatus?`?status=${encodeURIComponent(currentStatus)}`:''}`); renderStats(data.stats); renderOrders(data.orders); const ids=data.orders.map(o=>String(o.id)); const seen=loadSeen(); const unseen=ids.filter(id=>!seen.includes(id)); if(unseen.length){ playNotificationSound(); showBrowserNotification(unseen.length); } saveSeen(ids); bindActions(); }catch(err){ if(err.message==='Unauthorized'){ window.location.href='/admin/loginarabcafeaau/'; return; } CAFE.flash(err.message,'danger'); } }
function bindActions(){ document.querySelectorAll('[data-cancel]').forEach(btn=>btn.onclick=async()=>{ if(!confirm('تأكيد إلغاء الطلب؟')) return; await CAFE.api(`/api/admin/orders/${btn.dataset.cancel}/cancel`,{method:'POST'}); refresh(); }); }
document.querySelectorAll('.filter-pill').forEach(el=>el.addEventListener('click',(e)=>{e.preventDefault(); currentStatus=el.dataset.status||''; document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active')); el.classList.add('active'); refresh(); }));
document.getElementById('delete-all-btn').onclick=async()=>{ if(!confirm('متأكد أنك تريد حذف جميع الطلبات؟')) return; await CAFE.api('/api/admin/orders/delete-all',{method:'POST'}); refresh(); };
document.getElementById('logout-btn').onclick=async()=>{ await CAFE.api('/api/admin/logout',{method:'POST'}); window.location.href='/admin/loginarabcafeaau/'; };
document.getElementById('enable-sound-btn').onclick=async()=>{ try{ await ensureAudioReady(); alertsEnabled = !(alertsEnabled && audioCtx); if(alertsEnabled) await requestBrowserNotifications(); document.getElementById('enable-sound-btn').className = alertsEnabled ? 'btn btn-success rounded-pill px-4' : 'btn btn-outline-secondary rounded-pill px-4'; }catch(e){ console.error(e);} };
refresh(); setInterval(refresh,15000);
</script><script src="/static/js/bootstrap.bundle.min.js"></script></body></html>
