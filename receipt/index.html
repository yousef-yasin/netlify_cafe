<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>فاتورة الطلب</title><style>body{font-family:Arial,sans-serif;padding:16px;max-width:320px;margin:auto;color:#111}.header{text-align:center}.logo{width:72px;height:72px;object-fit:cover;border-radius:50%;margin:0 auto 8px;display:block}.line{border-top:1px dashed #333;margin:12px 0}.item{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;gap:8px}.muted{color:#666;font-size:13px}@media print {.no-print{display:none} body{padding:0}}</style></head><body><div class="no-print" style="margin-bottom:16px;text-align:center"><button onclick="window.print()">طباعة</button><a href="/afdminarabcafeaau123/">رجوع</a></div><div id="receipt"></div><script src="/static/js/app-common.js"></script><script>
(async()=>{ const id=new URLSearchParams(location.search).get('id'); if(!id){ document.getElementById('receipt').innerHTML='<p>لا يوجد رقم طلب.</p>'; return; } try{ const {order}=await CAFE.api(`/api/admin/orders/${id}`); document.title=`فاتورة الطلب #${order.id}`; document.getElementById('receipt').innerHTML=`<div class="header"><img class="logo" src="/seed/logo.png" alt="logo"><h2 style="margin:0">ARAB CAFE</h2><div class="muted">فاتورة الطلب #${order.id}</div><div class="muted">${CAFE.dt(order.created_at)}</div></div><div class="line"></div><p><strong>الطالب:</strong> ${order.student_name}</p><p><strong>التلفون:</strong> ${order.phone}</p><p><strong>المبنى:</strong> ${order.building}</p>${order.notes?`<p><strong>ملاحظات:</strong> ${order.notes}</p>`:''}<div class="line"></div>${order.items.map(item=>`<div class="item"><span>${item.quantity} × ${item.item_name}</span><span>${CAFE.money(item.unit_price*item.quantity)}</span></div>`).join('')}<div class="line"></div><div class="item" style="font-weight:bold"><span>المجموع</span><span>${CAFE.money(order.total)}</span></div><div class="line"></div><p style="text-align:center">شكراً وبالهناء والشفاء</p>`; setTimeout(()=>window.print(),300); }catch(err){ document.getElementById('receipt').innerHTML=`<p>${err.message}</p>`; }})();
</script></body></html>
