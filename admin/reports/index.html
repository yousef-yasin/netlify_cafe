<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>التقارير</title><link rel="stylesheet" href="/static/css/bootstrap.rtl.min.css"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="/static/css/style.css"></head><body><div id="site-shell"></div><script src="/static/js/app-common.js"></script><script>
CAFE.ensureBase('تقارير الأيام والطلبات');
const content=document.getElementById('page-content');
content.innerHTML=`<div class="container py-3"><div class="dashboard-hero mb-4"><div><h1 class="mb-2">تقارير الأيام والطلبات</h1><p class="mb-0 text-white-50">شوف كل يوم كم طلب دخل، شو محتوى الطلبات، وإجمالي كل يوم تحتها.</p></div><div class="d-flex gap-2 flex-wrap"><a href="/afdminarabcafeaau123/" class="btn btn-light rounded-pill px-4">الطلبات</a><a href="/admin/menu/" class="btn btn-warning rounded-pill px-4">المنيو</a></div></div><div class="grand-total-box mb-4" id="grand-total-box"></div><div id="reports-list"></div></div>`;
async function load(){ try{ const data=await CAFE.api('/api/admin/reports'); document.getElementById('grand-total-box').innerHTML=`الإجمالي الكلي لكل الأيام: <strong>${CAFE.money(data.grand_total)}</strong>`; document.getElementById('reports-list').innerHTML=data.reports_data.length?data.reports_data.map(group=>`<div class="report-day-card mb-4"><div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3"><div><h3 class="mb-1">تاريخ ${group.date}</h3><div class="text-muted">${group.total_count} طلب</div></div><div class="price-tag">مجموع اليوم: ${CAFE.money(group.total_amount)}</div></div>${group.orders.map(order=>`<div class="report-order-row"><div class="d-flex justify-content-between flex-wrap gap-2 mb-2"><strong>طلب #${order.id} - ${order.student_name}</strong><span class="text-muted">${order.phone} • ${new Date(order.created_at).toLocaleTimeString('en-GB',{timeZone:'Asia/Amman',hour:'2-digit',minute:'2-digit'})}</span></div>${order.items.map(item=>`<div class="summary-line small"><span>${item.quantity} × ${item.item_name}</span><strong>${CAFE.money(item.unit_price*item.quantity)}</strong></div>`).join('')}<div class="summary-line mt-2 total-line"><span>إجمالي الطلب</span><strong>${CAFE.money(order.total)}</strong></div></div>`).join('')}</div>`).join(''):'<div class="empty-box">لا يوجد بيانات طلبات بعد.</div>'; }catch(err){ if(err.message==='Unauthorized'){ window.location.href='/admin/loginarabcafeaau/'; return;} CAFE.flash(err.message,'danger'); }}
load();
</script><script src="/static/js/bootstrap.bundle.min.js"></script></body></html>
