<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>إدارة المنيو</title><link rel="stylesheet" href="/static/css/bootstrap.rtl.min.css"><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="/static/css/style.css"></head><body><div id="site-shell"></div><script src="/static/js/app-common.js"></script><script>
CAFE.ensureBase('إدارة المنيو');
const content=document.getElementById('page-content');
content.innerHTML=`<div class="container py-3"><div class="dashboard-hero mb-4"><div><h1 class="mb-2">إدارة المنيو</h1><p class="mb-0 text-white-50">كل اسم وسعر وصورة مخزنين داخل الداتا بيس، وصاحب الكافتيريا يقدر يعدلهم بأي وقت.</p></div><div class="d-flex gap-2 flex-wrap"><a href="/afdminarabcafeaau123/" class="btn btn-light rounded-pill px-4">رجوع للطلبات</a><a href="/admin/reports/" class="btn btn-warning rounded-pill px-4">التقارير</a></div></div><div class="row g-4 align-items-start"><div class="col-xl-4"><div class="admin-panel mb-4"><h4>إضافة قسم جديد</h4><form id="add-category-form"><div class="mb-2"><input class="form-control rounded-4" name="category_name" placeholder="اسم القسم" required></div><div class="mb-2"><input class="form-control rounded-4" name="category_slug" placeholder="slug-example" required></div><div class="mb-3"><label class="form-label">يعرض صور؟</label><select class="form-select rounded-4" name="show_image"><option value="1">نعم</option><option value="0">لا</option></select></div><button class="btn btn-dark w-100 rounded-pill">إضافة القسم</button></form></div><div class="admin-panel"><h4>إضافة صنف جديد</h4><form id="add-item-form"><div class="mb-2"><input class="form-control rounded-4" name="name" placeholder="اسم الصنف" required></div><div class="mb-2"><textarea class="form-control rounded-4" name="description" placeholder="وصف قصير"></textarea></div><div class="mb-2"><input type="number" step="0.01" class="form-control rounded-4" name="price" placeholder="السعر" required></div><div class="mb-2"><input type="file" class="form-control rounded-4" name="image_file" accept="image/*"></div><div class="mb-2"><select class="form-select rounded-4" name="category_id" id="add-item-category" required></select></div><div class="mb-3"><label class="form-label">يظهر بالمميز؟</label><select class="form-select rounded-4" name="featured"><option value="0">لا</option><option value="1">نعم</option></select></div><button class="btn btn-warning w-100 fw-bold rounded-pill">إضافة الصنف</button></form></div></div><div class="col-xl-8"><div class="row g-3" id="items-list"></div></div></div></div>`;
let currentData=null;
function itemImage(item){ return item.image_data_url || item.image_url || ''; }
function render(data){ currentData=data; document.getElementById('add-item-category').innerHTML=data.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join(''); document.getElementById('items-list').innerHTML=data.items.map(item=>`<div class="col-12"><div class="item-card h-100 ${!item.category.show_image?'no-image-card':''}"><div class="row g-0 align-items-stretch">${item.category.show_image && itemImage(item) ? `<div class="col-lg-4"><img class="item-image h-100" src="${itemImage(item)}" alt="${item.name}"></div>`:''}<div class="col"><div class="p-3"><div class="d-flex justify-content-between align-items-start gap-2 mb-2 flex-wrap"><div><div class="small text-muted">${item.category.name}</div><h5 class="mb-1">${item.name}</h5></div><span class="price-tag">${CAFE.money(item.price)}</span></div><p class="text-muted small mb-2">${item.description || 'بدون وصف'}</p><div class="d-flex flex-wrap gap-2 align-items-center mb-3"><span class="status-pill ${item.available?'status-ready':'status-cancelled'}">${item.available?'متاح':'مخفي'}</span>${item.featured?'<span class="badge text-bg-warning rounded-pill">مميز</span>':''}${itemImage(item)?'<span class="badge text-bg-dark rounded-pill">الصورة داخل DB</span>':''}</div><form class="edit-item-form" data-id="${item.id}"><div class="row g-2"><div class="col-md-6"><input class="form-control rounded-4" name="name" value="${item.name}" required></div><div class="col-md-3"><input type="number" step="0.01" class="form-control rounded-4" name="price" value="${item.price}" required></div><div class="col-md-3"><select class="form-select rounded-4" name="category_id" required>${data.categories.map(c=>`<option value="${c.id}" ${c.id===item.category_id?'selected':''}>${c.name}</option>`).join('')}</select></div><div class="col-12"><textarea class="form-control rounded-4" name="description" rows="2">${item.description || ''}</textarea></div><div class="col-md-4"><input type="file" class="form-control rounded-4" name="image_file" accept="image/*"></div><div class="col-md-2"><select class="form-select rounded-4" name="featured"><option value="1" ${item.featured?'selected':''}>مميز</option><option value="0" ${!item.featured?'selected':''}>عادي</option></select></div><div class="col-md-2"><select class="form-select rounded-4" name="available"><option value="1" ${item.available?'selected':''}>متاح</option><option value="0" ${!item.available?'selected':''}>مخفي</option></select></div><div class="col-md-2 d-flex align-items-center"><div class="form-check"><input class="form-check-input" type="checkbox" value="1" name="remove_image" id="remove${item.id}"><label class="form-check-label small" for="remove${item.id}">حذف الصورة</label></div></div><div class="col-md-2 d-grid"><button class="btn btn-dark rounded-pill">حفظ التعديل</button></div></div></form><div class="d-flex gap-2 mt-3 flex-wrap"><button class="btn btn-outline-dark rounded-pill" data-toggle="${item.id}">تبديل الحالة</button><button class="btn btn-outline-danger rounded-pill" data-delete="${item.id}">حذف</button></div></div></div></div></div></div>`).join(''); bindActions(); }
async function load(){ try{ render(await CAFE.api('/api/admin/menu')); }catch(err){ if(err.message==='Unauthorized'){ window.location.href='/admin/loginarabcafeaau/'; return;} CAFE.flash(err.message,'danger'); } }
function bindActions(){ document.querySelectorAll('.edit-item-form').forEach(form=>form.onsubmit=async(e)=>{ e.preventDefault(); const fd=new FormData(form); const file=fd.get('image_file'); const image_data_url=file && file.size? await CAFE.readFileAsDataURL(file):null; await CAFE.api(`/api/admin/items/${form.dataset.id}`,{method:'POST',body:JSON.stringify({name:fd.get('name'),description:fd.get('description'),price:fd.get('price'),category_id:fd.get('category_id'),featured:fd.get('featured'),available:fd.get('available'),remove_image:fd.get('remove_image')==='1',image_data_url})}); CAFE.flash('تم تعديل الصنف بنجاح.'); load(); }); document.querySelectorAll('[data-toggle]').forEach(btn=>btn.onclick=async()=>{ await CAFE.api(`/api/admin/items/${btn.dataset.toggle}/toggle`,{method:'POST'}); load(); }); document.querySelectorAll('[data-delete]').forEach(btn=>btn.onclick=async()=>{ if(!confirm('تأكيد حذف الصنف؟')) return; await CAFE.api(`/api/admin/items/${btn.dataset.delete}/delete`,{method:'POST'}); load(); }); }
document.getElementById('add-category-form').onsubmit=async(e)=>{ e.preventDefault(); const fd=new FormData(e.target); await CAFE.api('/api/admin/categories',{method:'POST',body:JSON.stringify({category_name:fd.get('category_name'),category_slug:fd.get('category_slug'),show_image:fd.get('show_image')})}); CAFE.flash('تمت إضافة القسم بنجاح.'); e.target.reset(); load(); };
document.getElementById('add-item-form').onsubmit=async(e)=>{ e.preventDefault(); const fd=new FormData(e.target); const file=fd.get('image_file'); const image_data_url=file && file.size? await CAFE.readFileAsDataURL(file):null; await CAFE.api('/api/admin/items',{method:'POST',body:JSON.stringify({name:fd.get('name'),description:fd.get('description'),price:fd.get('price'),category_id:fd.get('category_id'),featured:fd.get('featured'),image_data_url})}); CAFE.flash('تمت إضافة الصنف ونزل مباشرة عند الطلاب.'); e.target.reset(); load(); };
load();
</script><script src="/static/js/bootstrap.bundle.min.js"></script></body></html>
